<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>MRF SMS – Premium OTP Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07111f;--bg2:#0b1728;--panel:rgba(13,25,45,.88);--panel2:rgba(17,34,59,.95);--card:rgba(255,255,255,.06);--card2:rgba(255,255,255,.08);--border:rgba(255,255,255,.10);--text:#e7edf7;--muted:#90a0ba;--primary:#31d968;--primary2:#1fc857;--danger:#ef4444;--warning:#f59e0b;--info:#38bdf8;--shadow:0 20px 60px rgba(0,0,0,.32)}
body.light{--bg:#eef4ff;--bg2:#dfeaff;--panel:rgba(255,255,255,.94);--panel2:rgba(255,255,255,.98);--card:rgba(12,22,40,.04);--card2:rgba(12,22,40,.06);--border:rgba(15,23,42,.10);--text:#0f172a;--muted:#64748b;--shadow:0 20px 60px rgba(15,23,42,.12)}
body{min-height:100vh;font-family:'Inter',sans-serif;color:var(--text);background:linear-gradient(140deg,var(--bg),var(--bg2));overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
.blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none;z-index:0}
.blob-1{width:400px;height:400px;background:rgba(34,197,94,.15);top:-100px;left:-100px;animation:bfloat 25s ease-in-out infinite}
.blob-2{width:350px;height:350px;background:rgba(56,189,248,.12);bottom:-80px;right:-80px;animation:bfloat 20s ease-in-out infinite reverse}
.blob-3{width:250px;height:250px;background:rgba(168,85,247,.08);top:50%;left:50%;animation:bfloat 30s ease-in-out infinite 5s}
@keyframes bfloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,-30px) scale(1.1)}50%{transform:translate(-30px,50px) scale(.9)}75%{transform:translate(40px,20px) scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}
@keyframes confettiFall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
.app-shell{position:relative;z-index:1;padding:18px}
.dashboard{display:grid;grid-template-columns:250px 1fr 330px;gap:14px;min-height:calc(100vh - 36px)}
.glass{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:24px}
.sidebar{padding:14px;display:flex;flex-direction:column;gap:12px;position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.brand{display:flex;align-items:center;gap:10px;padding:12px;border-radius:18px;background:linear-gradient(145deg,rgba(74,222,128,.14),rgba(56,189,248,.10));border:1px solid rgba(255,255,255,.12)}
.brand-mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:20px;font-weight:800;background:linear-gradient(135deg,#31d968,#1fc857);color:#04210f;box-shadow:0 8px 20px rgba(34,197,94,.28);flex-shrink:0}
.brand h1{font-size:15px;font-weight:800;line-height:1.1}.brand p{margin-top:2px;color:var(--muted);font-size:10px}
.nav-card{padding:10px;border-radius:18px;background:var(--card);border:1px solid var(--border)}
.nav-label{color:var(--muted);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding:0 6px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--text);cursor:pointer;transition:.25s;font-size:12.5px;font-weight:600}
.nav-item:hover{background:var(--card2);border-color:var(--border);transform:translateY(-1px)}
.nav-item.active{background:linear-gradient(135deg,rgba(74,222,128,.20),rgba(56,189,248,.18));border-color:rgba(74,222,128,.22)}
.nav-icon{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;overflow:hidden}
.nav-icon svg{width:20px;height:20px}
.main{padding:14px;overflow:hidden}
.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;padding:16px;border-radius:22px;background:radial-gradient(circle at top right,rgba(74,222,128,.18),transparent 28%),linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--border)}
.hero h2{font-size:24px;font-weight:800;letter-spacing:-.03em;margin-bottom:5px}
.hero p{color:var(--muted);line-height:1.5;max-width:680px;font-size:12px}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.hero-badge{padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:11px;font-weight:600}
.hero-stats{min-width:180px;display:grid;gap:8px}
.mini-stat{padding:12px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid var(--border)}
.mini-stat .label{color:var(--muted);font-size:10px;margin-bottom:4px}.mini-stat .value{font-size:18px;font-weight:800}
.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;padding:12px;border-radius:18px;background:var(--card);border:1px solid var(--border)}
.search-wrap{display:flex;align-items:center;gap:8px;flex:1;padding:10px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04)}
.search-wrap input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:12px}
.search-wrap input::placeholder{color:var(--muted)}
.chip{padding:8px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-weight:600;font-size:11px;cursor:pointer;transition:.2s}
.chip:hover,.chip.active{border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.14)}
.section-title{margin-bottom:10px}
.section-title h3{font-size:16px;font-weight:800}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.country-card{padding:14px;border-radius:20px;background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--border);transition:.25s;box-shadow:0 10px 30px rgba(0,0,0,.14)}
.country-card:hover{transform:translateY(-3px);border-color:rgba(74,222,128,.22)}
.country-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.country-flag{width:44px;height:44px;display:grid;place-items:center;font-size:24px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid var(--border)}
.status-pill{padding:5px 7px;border-radius:999px;background:rgba(74,222,128,.13);border:1px solid rgba(74,222,128,.18);color:#99f6b4;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.country-name{font-size:15px;font-weight:700;margin-bottom:3px}
.country-code{color:var(--muted);font-size:11px;margin-bottom:12px}
.country-price{font-size:22px;font-weight:800;color:var(--primary);letter-spacing:-.04em}
.btn{border:none;outline:none;cursor:pointer;transition:.22s;font-weight:700;font-family:inherit}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.btn-primary{width:100%;padding:11px 14px;border-radius:14px;color:#04210f;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 8px 18px rgba(34,197,94,.26)}
.btn-soft{padding:9px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:linear-gradient(135deg,#fb7185,#ef4444);color:#fff}
.btn-warning{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1f1300}
.btn-info{background:linear-gradient(135deg,#67e8f9,#38bdf8);color:#062132}
.btn-google{width:100%;padding:11px 14px;border-radius:14px;background:#fff;color:#111827;border:1px solid #d1d5db}
.right-panel{padding:14px;display:flex;flex-direction:column;gap:12px;position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto}
.right-panel::-webkit-scrollbar{width:3px}.right-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.panel-block{padding:14px;border-radius:18px;background:var(--card);border:1px solid var(--border)}
.top-auth-card{padding:14px;border-radius:20px;background:radial-gradient(circle at top left,rgba(74,222,128,.18),transparent 25%),linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--border)}
.top-auth-card h3{font-size:16px;font-weight:800;margin-bottom:4px}.top-auth-card p{color:var(--muted);line-height:1.4;font-size:12px}
.auth-switch{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);margin:12px 0}
.auth-tab{padding:9px;border-radius:10px;border:none;background:transparent;color:var(--text);font-weight:700;cursor:pointer;font-size:12px}
.auth-tab.active{background:rgba(74,222,128,.16);color:#bcf7d2}
.auth-form{display:flex;flex-direction:column;gap:8px}
.input-wrap{display:flex;align-items:center;gap:8px;padding:10px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04)}
.input-wrap input{flex:1;border:none;background:transparent;outline:none;color:var(--text);font-size:12px}
.input-wrap input::placeholder{color:var(--muted)}
.sub-text{margin-top:2px;font-size:10px;color:var(--muted);line-height:1.3}
.forgot-link{color:var(--info);font-size:11px;font-weight:600;cursor:pointer;text-align:center;padding:4px 0;display:block}
.forgot-link:hover{text-decoration:underline}
.balance-card{padding:16px;border-radius:20px;background:radial-gradient(circle at top right,rgba(74,222,128,.20),transparent 30%),linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--border)}
.balance-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:14px}
.balance-top .label{color:var(--muted);font-size:11px;margin-bottom:4px}
.balance-amount{font-size:30px;font-weight:800;letter-spacing:-.05em;color:var(--primary);line-height:1}
.balance-chip{padding:6px 8px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid var(--border);font-size:10px;font-weight:700}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.orders-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.order-item{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px}
.order-country{font-size:13px;font-weight:700}
.order-status{padding:5px 7px;border-radius:999px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.20);color:#fcd34d;font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.order-number-small{font-size:11px;color:var(--muted);margin-bottom:6px;word-break:break-all}
.order-actions{display:flex;gap:5px;flex-wrap:wrap}
.mini-btn{padding:7px 9px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-size:10px;font-weight:700}
.admin-panel{display:none;margin-top:14px;padding:14px;border-radius:20px;background:var(--card);border:1px solid var(--border)}
.admin-panel h3{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:16px;font-weight:800}
.badge{min-width:18px;height:18px;border-radius:999px;display:inline-grid;place-items:center;padding:0 5px;background:linear-gradient(135deg,#fb7185,#ef4444);color:#fff;font-size:9px;font-weight:800}
.admin-grid{display:grid;gap:12px}
.admin-section{padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.admin-section h4{font-size:13px;margin-bottom:8px;font-weight:700}
.admin-card{padding:10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);margin-bottom:6px;font-size:12px}
.admin-meta{color:var(--muted);font-size:11px;line-height:1.4;margin:4px 0 8px}
.admin-actions{display:flex;gap:5px;flex-wrap:wrap}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--border);text-align:center}
.stat-card .sv{font-size:20px;font-weight:800;margin-top:4px}
.stat-card .sl{color:var(--muted);font-size:10px}
.account-card{padding:14px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
.account-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.account-heading h3{font-size:15px}.account-heading p{font-size:11px;color:var(--muted)}
.account-toggle-btn{width:36px;height:36px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:20px;font-weight:800;cursor:pointer;line-height:1;flex-shrink:0}
.account-toggle-btn:hover{background:rgba(255,255,255,.09)}
.account-content{margin-top:10px}
.account-row{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.account-row:last-child{border-bottom:none}
.account-label{color:var(--muted);font-size:11px}
.account-value{font-weight:700;text-align:right;word-break:break-all;font-size:12px}
.modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,.55);backdrop-filter:blur(4px);z-index:3000;padding:14px;justify-content:center;align-items:center}
.modal-content{width:min(640px,100%);max-height:88vh;overflow:auto;border-radius:22px;background:var(--panel2);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.modal-header h3{font-size:20px;font-weight:800}
.modal-header p{color:var(--muted);margin-top:3px;font-size:12px}
.close-x{width:36px;height:36px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:15px;cursor:pointer}
.processing-wrap{text-align:center;padding:20px 8px}
.ring{width:56px;height:56px;margin:0 auto 12px;border-radius:50%;border:4px solid rgba(255,255,255,.08);border-top-color:var(--primary);animation:spin .9s linear infinite}
.payment-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 14px}
.payment-box{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
.payment-box strong{display:block;margin-bottom:4px;font-size:12px}
.payment-box p{color:var(--muted);font-size:11px;line-height:1.4}
.deposit-form{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.file-input{padding:10px;border:1px dashed var(--border);border-radius:14px;background:rgba(255,255,255,.04)}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;padding:14px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid var(--border);margin-bottom:10px}
.order-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pill{padding:7px 9px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:10px;font-weight:700}
.pill.green{background:#22c55e!important;border-color:#16a34a!important;color:#fff!important}
.order-number-box{padding:14px;border-radius:18px;background:linear-gradient(145deg,rgba(74,222,128,.10),rgba(56,189,248,.08));border:1px solid rgba(255,255,255,.12);margin-bottom:10px}
.number-line{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.number-display{font-size:22px;font-weight:800;letter-spacing:-.03em;word-break:break-all}
.otp-state{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--border);margin-bottom:10px}
.otp-wait{display:flex;align-items:center;gap:10px}
.small-ring{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.08);border-top-color:var(--info);animation:spin .8s linear infinite;flex-shrink:0}
.otp-code{display:none;padding:14px;border-radius:18px;background:linear-gradient(135deg,rgba(74,222,128,.16),rgba(56,189,248,.12));border:1px solid rgba(74,222,128,.24);margin-bottom:10px}
.otp-code .label{color:var(--muted);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.otp-code .value{font-size:28px;font-weight:800;letter-spacing:.2em}
.timeline{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.timeline-box{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
.timeline-box .t-label{color:var(--muted);font-size:10px;margin-bottom:4px}
.timeline-box .t-value{font-size:18px;font-weight:800}
.button-group{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
.button-group .btn{padding:10px 12px;border-radius:14px;font-size:12px}
.wide-btn{width:100%;margin-top:8px;padding:10px 14px;border-radius:14px}
.toast-wrap{position:fixed;right:14px;bottom:14px;z-index:5000;display:flex;flex-direction:column;gap:6px}
.toast{min-width:240px;max-width:340px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow);backdrop-filter:blur(16px);color:#fff;animation:slideUp .25s}
.toast.success{background:rgba(34,197,94,.95)}.toast.error{background:rgba(239,68,68,.95)}.toast.info{background:rgba(56,189,248,.95)}
.topbar-mobile{display:none;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.topbar-brand{font-size:16px;font-weight:800}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--text);backdrop-filter:blur(18px);cursor:pointer}
.sidebar-overlay{display:none;position:fixed;inset:0;background:transparent;z-index:2000}
.theme-toggle{position:fixed;right:14px;top:14px;z-index:2500;padding:8px 12px;border-radius:14px;border:1px solid var(--border);background:var(--panel);color:var(--text);backdrop-filter:blur(18px);cursor:pointer;font-weight:700;font-size:11px}
.hidden{display:none!important}
.notif-bar{display:none;padding:8px 12px;border-radius:12px;background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;font-weight:800;animation:pulse 1s infinite;margin-bottom:8px}
.confetti-piece{position:fixed;width:8px;height:8px;z-index:9999;pointer-events:none;border-radius:2px;animation:confettiFall var(--dur) ease-in forwards}
@media(max-width:1100px){.dashboard{grid-template-columns:220px 1fr}.right-panel{grid-column:1/-1;position:static;max-height:none;order:1}.main{order:2}}
@media(max-width:860px){.dashboard{grid-template-columns:1fr}.sidebar{position:fixed;left:14px;top:14px;bottom:14px;width:min(280px,calc(100vw - 28px));transform:translateX(-120%);transition:.25s;z-index:2200;max-height:none}.sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}.topbar-mobile{display:flex}.theme-toggle{top:auto;bottom:14px}.hero{flex-direction:column}.hero-stats{width:100%;grid-template-columns:1fr 1fr}.stat-grid{grid-template-columns:1fr 1fr}.payment-grid,.timeline,.button-group,.action-row{grid-template-columns:1fr}.right-panel{order:1}.main{order:2}}
@media(max-width:600px){.app-shell{padding:10px}.dashboard{gap:8px}.main,.right-panel,.sidebar{padding:10px}.hero{padding:12px}.hero h2{font-size:20px}.country-grid{grid-template-columns:1fr}.modal{padding:8px}.modal-content{padding:12px}.number-display{font-size:18px}.otp-code .value{font-size:24px}.toast-wrap{right:8px;left:8px;bottom:8px}.toast{min-width:auto;max-width:none}}
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle">🌗</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="app-shell">
<div class="topbar-mobile">
<button class="icon-btn" id="hamburger">☰</button>
<div class="topbar-brand">MRF SMS</div>
</div>

<div class="dashboard">
<aside class="sidebar glass" id="sidebar">
<div class="brand"><div class="brand-mark">M</div><div><h1>MRF SMS</h1><p>Premium OTP Portal</p></div></div>
<div class="nav-card">
